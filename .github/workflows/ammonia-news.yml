name: Run Ammonia Script (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-ammonia:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser

      - name: Run ammonia script
        run: python ammonia-research/ammonia_finder.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ammonia-research/new_ammonia_links.txt || true

          git commit -m "Generate ammonia news" || exit 0
          git push
